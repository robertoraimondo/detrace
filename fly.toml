app = "detrace"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  DETRACE_MVSEP_FORCE_CPU = "0"
  DETRACE_ENABLE_CUDA = "0"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 8
    hard_limit = 12

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "120s"
    method = "GET"
    path = "/api/status"
