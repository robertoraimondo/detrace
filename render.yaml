services:
  - type: web
    name: detrace
    runtime: python
    buildCommand: pip install -r requirements.txt && python render_setup.py
    startCommand: python render_setup.py && gunicorn detrace.wsgi --workers 1 --threads 4 --timeout 1800
    envVars:
      - key: DETRACE_MVSEP_FORCE_CPU
        value: "0"
      - key: DETRACE_ENABLE_CUDA
        value: "0"
